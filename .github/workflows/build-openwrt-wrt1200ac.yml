name: Build OpenWrt (WRT1200AC) - Manual Trigger

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Device profile (PROFILE value)'
        required: false
        default: 'linksys_wrt1200ac'
      apply_patch:
        description: 'If true, apply patch at .github/patches/single-firmware-wrt1200ac.patch'
        required: false
        default: 'true'
      patch_path:
        description: 'Path to patch to apply (relative)'
        required: false
        default: '.github/patches/single-firmware-wrt1200ac.patch'
      jobs:
        description: 'Parallel build jobs (make -j)'
        required: false
        default: '2'

jobs:
  build:
    name: Build OpenWrt image (manual)
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      # These env values read from inputs at runtime
      IMAGE_PROFILE: ${{ github.event.inputs.profile }}
      PATCH_PATH: ${{ github.event.inputs.patch_path }}
      APPLY_PATCH: ${{ github.event.inputs.apply_patch }}
      JOBS: ${{ github.event.inputs.jobs }}
      RELEASE_TAG_PREFIX: "openwrt-build"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install APT dependencies (robust)
        run: |
          sudo apt-get update
          # Install build deps; avoid python3-distutils (some runners miss this package name)
          sudo apt-get install -y --no-install-recommends \
            build-essential libncurses5-dev gawk git ccache ecj fastjar gettext unzip python3 python3-pip python3-venv rsync subversion flex bison libssl-dev time bc

      - name: Show git branch/commit
        run: |
          echo "Branch: $(git rev-parse --abbrev-ref HEAD)"
          echo "Commit: $(git rev-parse --short HEAD)"

      - name: (Optional) Apply single-firmware patch if present (non-committal)
        if: ${{ env.APPLY_PATCH == 'true' }}
        run: |
          if [ -f "${{ env.PATCH_PATH }}" ]; then
            echo "Found patch at ${{ env.PATCH_PATH }}, applying in working tree..."
            git apply --verbose "${{ env.PATCH_PATH }}" || (echo "git apply failed" && sed -n '1,200p' "${{ env.PATCH_PATH }}" && exit 1)
          else
            echo "No patch file found at ${{ env.PATCH_PATH }}, continuing without it."
          fi

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Cache build artifacts (download/tmp/build_dir)
        uses: actions/cache@v4
        with:
          path: |
            downloads
            tmp
            build_dir
          key: ${{ runner.os }}-openwrt-build-${{ hashFiles('feeds.conf*', 'package/*/Makefile') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-openwrt-build-

      - name: Prepare non-interactive config
        run: |
          if [ ! -f .config ]; then
            echo "CONFIG_TARGET_mvebu=y" > .config
            echo "CONFIG_TARGET_mvebu_cortexa9=y" >> .config
          fi
          make defconfig

      - name: Build OpenWrt image (profile)
        run: |
          echo "Building PROFILE=${{ env.IMAGE_PROFILE }} with -j${{ env.JOBS }}"
          make -j${{ env.JOBS }} image PROFILE=${{ env.IMAGE_PROFILE }} V=s || (echo "Build failed, dumping last 200 lines of build log" && tail -n 200 logs/* || true && false)

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find bin/targets -type f -name "*${{ env.IMAGE_PROFILE }}*.bin" -print -exec cp {} artifacts/ \; || true
          find bin -type f -name "openwrt-*-initramfs-kernel.bin" -print -exec cp {} artifacts/ \; || true
          find bin -type f -name "openwrt-*-sysupgrade.bin" -print -exec cp {} artifacts/ \; || true
          ls -lah artifacts || true

      - name: Package artifacts
        run: |
          mkdir -p release
          TARFILE=release/openwrt-${{ env.IMAGE_PROFILE }}-${{ github.run_number }}.tar.gz
          tar -czf "$TARFILE" -C artifacts .
          echo "$TARFILE"
          ls -lh "$TARFILE"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-artifacts-${{ github.run_id }}
          path: release/

      - name: Create GitHub Release (prerelease)
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG_PREFIX }}-${{ github.run_number }}
          name: OpenWrt build #${{ github.run_number }} for ${{ env.IMAGE_PROFILE }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to Release
        if: steps.create_release.outputs.upload_url != ''
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release/openwrt-${{ env.IMAGE_PROFILE }}-${{ github.run_number }}.tar.gz
          asset_name: openwrt-${{ env.IMAGE_PROFILE }}-${{ github.run_number }}.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Finish
        run: |
          echo "Workflow finished. Artifacts uploaded as workflow artifact and release."

name: Build OpenWrt Linksys Wrt1200Ac

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'Pilih Versi OpenWrt (Spesifik)'
        required: true
        default: '23.05.4'
        type: choice
        options:
          # Versi Snapshot
          - 'main'
          # Versi 24.10
          - '24.10.2'
          - '24.10.1'
          - '24.10.0'
          - '24.10'
          # Versi 23.05
          - '23.05.4'
          - '23.05.3'
          - '23.05.2'
          - '23.05.1'
          - '23.05.0'
          - '23.05'
          # Versi 22.03
          - '22.03.6'
          - '22.03.5'
          - '22.03.4'
          - '22.03.3'
          - '22.03.2'
          - '22.03.1'
          - '22.03'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          file wget

      - name: Clone and checkout OpenWrt source code
        run: |
          git clone https://git.openwrt.org/openwrt/openwrt.git
          cd openwrt

          VERSION="${{ inputs.openwrt_version }}"
          REF_TO_CHECKOUT=""

          # Logika untuk menentukan referensi Git (Tag atau Branch)
          # Jika versi adalah point release (contoh: 23.05.2), gunakan sebagai tag dengan prefix 'v'
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            REF_TO_CHECKOUT="v$VERSION"
          # Jika versi adalah rilis mayor (contoh: 23.05), gunakan sebagai branch
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
            REF_TO_CHECKOUT="openwrt-$VERSION"
          # Jika tidak, anggap sebagai branch 'main' (snapshot)
          else
            REF_TO_CHECKOUT="main"
          fi
          
          echo "==> Checking out Git reference: $REF_TO_CHECKOUT"
          git checkout "$REF_TO_CHECKOUT"

      - name: Update OpenWrt feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Check for custom patch
        id: check_patch
        run: |
          if [ -f "999-linksys-wrt1200ac-single-partition.patch" ]; then
            echo "patch_exists=true" >> $GITHUB_OUTPUT
          else
            echo "patch_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Copy custom DTS patch (if it exists)
        if: steps.check_patch.outputs.patch_exists == 'true'
        run: |
          echo "==> Custom partition patch found. Applying..."
          cp 999-linksys-wrt1200ac-single-partition.patch openwrt/target/linux/mvebu/patches-*/
      
      - name: Generate custom config from package list
        run: |
          cd openwrt
          echo "==> Generating configuration..."
          # Mulai dengan config dasar untuk perangkat
          echo "CONFIG_TARGET_mvebu_cortexa9=y" > .config
          echo "CONFIG_TARGET_mvebu_cortexa9_DEVICE_linksys_wrt1200ac=y" >> .config
          
          # Tambahkan paket dari packages.txt jika file ada
          if [ -f "../packages.txt" ]; then
            echo "==> Adding packages from packages.txt..."
            cat ../packages.txt >> .config
          fi
          
          # Finalisasi konfigurasi
          make defconfig

      - name: Compile firmware
        run: |
          cd openwrt
          echo "==> Compiling firmware..."
          make -j$(nproc) download V=s
          make -j$(nproc) V=s

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          cp openwrt/bin/targets/mvebu/cortexa9/*sysupgrade.img artifacts/
          cp openwrt/bin/targets/mvebu/cortexa9/sha256sums artifacts/
          cp openwrt/.config artifacts/final.config

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware-wrt1200ac-${{ inputs.openwrt_version }}
          path: artifacts/

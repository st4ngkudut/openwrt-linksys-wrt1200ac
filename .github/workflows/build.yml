name: Build OpenWrt WRT1200AC

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'Pilih Branch/Tag OpenWrt (Spesifik)'
        required: true
        default: 'v23.05.4'
        type: choice
        options:
          - 'main'
          - 'openwrt-23.05'
          - 'openwrt-22.03'
          - 'v23.05.4'
          - 'v23.05.3'
          - 'v23.05.2'
          - 'v22.03.6'
          - 'v22.03.5'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Kode Repositori Anda
        uses: actions/checkout@v4

      - name: 2. Instal Dependensi Build
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          file wget

      - name: 3. Clone dan Checkout Source OpenWrt
        run: |
          git clone https://git.openwrt.org/openwrt/openwrt.git
          cd openwrt
          git checkout ${{ inputs.openwrt_version }}

      - name: 4. Perbarui Feeds & Terapkan Kustomisasi
        run: |
          cd openwrt
          
          # Perbarui dan instal feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Salin file .config kustom
          cp ../.config ./.config

          # Salin patch DTS kustom jika ada
          if [ -f "../999-linksys-wrt1200ac-single-partition.patch" ]; then
            echo "==> Custom partition patch found. Applying..."
            cp ../999-linksys-wrt1200ac-single-partition.patch ./target/linux/mvebu/patches-*/
          fi

          # Finalisasi konfigurasi
          make defconfig

      - name: 5. Kompilasi Firmware
        run: |
          cd openwrt
          make -j$(nproc) download V=s
          make -j$(nproc) V=s

      - name: 6. Siapkan Artefak
        run: |
          mkdir -p artifacts
          cp openwrt/bin/targets/mvebu/cortexa9/*sysupgrade.img artifacts/
          cp openwrt/bin/targets/mvebu/cortexa9/sha256sums artifacts/
          cp openwrt/.config artifacts/final.config

      - name: 7. Unggah Artefak
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware-${{ inputs.openwrt_version }}
          path: artifacts/          - 'v22.03.1'
          - 'v22.03.0'

jobs:
  build:
    # --- PERUBAHAN PENTING DIMULAI DI SINI ---
    # Menentukan server virtual yang akan digunakan
    runs-on: ubuntu-latest
    # Mendefinisikan langkah-langkah yang akan dijalankan
    steps:
      # Langkah 1: Checkout repositori Anda agar bisa mengakses file .config dan .patch
      - name: Checkout repository
        uses: actions/checkout@v4

      # Langkah 2: Menjalankan P3TERX Action
      - name: Build OpenWrt with P3TERX Action
        uses: P3TERX/Actions-OpenWrt@main
        with:
          # URL Repositori OpenWrt
          REPO_URL: https://github.com/openwrt/openwrt
          # Branch atau Tag yang akan di-build
          REPO_BRANCH: ${{ inputs.openwrt_version }}
          # File .config yang akan digunakan
          CONFIG_FILE: .config
          # Skrip kustom untuk menerapkan patch partisi
          DIY_P1_SH: |
            # Hanya jalankan jika file patch ada
            if [ -f "999-linksys-wrt1200ac-single-partition.patch" ]; then
              echo "==> Custom partition patch found. Applying..."
              cp 999-linksys-wrt1200ac-single-partition.patch target/linux/mvebu/patches-*/
            fi
          # Nama file output
          FIRMWARE_NAME: openwrt-wrt1200ac
          # Zona waktu
          TZ: Asia/Jakarta
